name: Deploy Contracts

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'testnet'
        type: choice
        options:
          - testnet
          - mainnet

jobs:
  build-and-deploy:
    name: Build WASM Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Build release WASM
        working-directory: contracts
        run: cargo build --target wasm32v1-none --release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: contracts-${{ github.sha }}
          name: Contract Build ${{ github.sha }}
          files: |
            contracts/target/wasm32v1-none/release/stealth_contract.wasm
            contracts/target/wasm32v1-none/release/pcs_token.wasm
            contracts/target/wasm32v1-none/release/liquidity_pool.wasm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Contracts CI

on:
  push:
    branches: [main, develop]
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Rustfmt Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain with rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        working-directory: contracts
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain with clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32v1-none

      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Run Clippy
        working-directory: contracts
        # Note: soroban-sdk v25 itself emits deprecated events::publish warnings.
        # We check for errors only (-D errors) so real mistakes still break CI
        # while upstream SDK deprecation noise does not.
        run: cargo clippy --all-targets --all-features -- -D errors

  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Run unit tests
        working-directory: contracts
        run: cargo test --all

  build-wasm:
    name: Build WASM Contracts
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Build stealth_contract WASM
        working-directory: contracts
        run: cargo build -p stealth_contract --target wasm32v1-none --release

      - name: Build pcs_token WASM
        working-directory: contracts
        run: cargo build -p pcs_token --target wasm32v1-none --release

      - name: Build liquidity_pool WASM
        working-directory: contracts
        run: cargo build -p liquidity_pool --target wasm32v1-none --release

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: soroban-wasm-${{ github.sha }}
          path: |
            contracts/target/wasm32v1-none/release/stealth_contract.wasm
            contracts/target/wasm32v1-none/release/pcs_token.wasm
            contracts/target/wasm32v1-none/release/liquidity_pool.wasm
          retention-days: 30
